<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#7a3f2a">
  <title>Naru Europe 2026</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="css/styles.css?v=20260619-map-sync-compact">
</head>
<body class="theme-rome" data-current-view="cover">
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Italy · France Family Trip</p>
        <h1>Naru Europe 2026</h1>
        <p class="subtitle">2026.07.15 - 2026.08.15 · 이탈리아·프랑스 가족여행</p>
      </div>
    </header>

    <nav class="tabs" aria-label="주요 화면">
      <button class="tab active" data-view="cover" title="홈" aria-label="홈">
        <span class="tab-icon" aria-hidden="true">⌂</span>
        <span class="tab-label">홈</span>
      </button>
      <button class="tab" data-view="today" title="오늘" aria-label="오늘">
        <span class="tab-icon" aria-hidden="true">◎</span>
        <span class="tab-label">오늘</span>
      </button>
      <button class="tab" data-view="itinerary" title="일정" aria-label="일정">
        <span class="tab-icon" aria-hidden="true">▦</span>
        <span class="tab-label">일정</span>
      </button>
      <button class="tab" data-view="tickets" title="티켓" aria-label="티켓">
        <span class="tab-icon" aria-hidden="true">▤</span>
        <span class="tab-label">티켓</span>
      </button>
      <button class="tab" data-view="talk" title="소통" aria-label="소통">
        <span class="tab-icon" aria-hidden="true">◌</span>
        <span class="tab-label">소통</span>
      </button>
      <button class="tab" data-view="naru" title="나루" aria-label="나루">
        <span class="tab-icon" aria-hidden="true">◇</span>
        <span class="tab-label">나루</span>
      </button>
      <button class="tab" data-view="emergency" title="비상" aria-label="비상">
        <span class="tab-icon" aria-hidden="true">!</span>
        <span class="tab-label">비상</span>
      </button>
    </nav>

    <section class="hero" id="hero">
      <div>
        <p id="todayLabel">오늘</p>
        <h2 id="heroTitle">여행 준비 중</h2>
        <p id="heroSummary">데이터를 불러오는 중입니다.</p>
      </div>
      <div class="sync-status" id="syncStatus">동기화 확인 중</div>
    </section>

    <main>
      <section class="view active" id="view-cover"></section>
      <section class="view" id="view-today"></section>
      <section class="view" id="view-itinerary"></section>
      <section class="view" id="view-tickets"></section>
      <section class="view" id="view-talk"></section>
      <section class="view" id="view-naru"></section>
      <section class="view" id="view-emergency"></section>
    </main>
  </div>

  <dialog class="talk-dialog" id="talkDialog">
    <button class="dialog-close" id="closeTalkDialog" type="button" aria-label="소통 카드 닫기">×</button>
    <div id="talkDialogContent"></div>
  </dialog>

  <dialog class="ticket-image-dialog" id="ticketImageDialog">
    <button class="dialog-close" id="closeTicketImageDialog" type="button" aria-label="티켓 이미지 닫기">×</button>
    <figure>
      <img id="ticketImagePreview" src="" alt="">
      <figcaption id="ticketImageCaption"></figcaption>
    </figure>
  </dialog>

  <template id="emptyTemplate">
    <div class="empty">
      <h3>표시할 데이터가 없습니다</h3>
      <p>CSV 데이터가 비어 있거나 아직 동기화되지 않았습니다.</p>
    </div>
  </template>

  <script src="js/app.js?v=20260619-map-sync-compact" type="module"></script>
</body>
</html>
